# ROS2 cpplint configuration for launch_cpp
# Reference: ament_cpplint default filters

# Line length (ROS2 default is 100)
linelength=100

# Filters (disable these checks)
# ROS2 allows C++11
filter=-build/c++11
# ROS2 considers passing non-const references to be ok
filter=-runtime/references
# Skip include order checking
filter=-build/include_order
# ROS2 uses custom header guard format (double underscore)
filter=-build/header_guard
# Skip include_what_you_use (hard to fix)
filter=-build/include_what_you_use
# Skip include_subdir (would require moving files)
filter=-build/include_subdir
# Skip runtime/int (int32_t vs int types)
filter=-runtime/int
# ROS2 wraps open curly braces for namespaces, classes and functions
filter=-whitespace/braces
# ROS2 doesn't indent keywords like public, protected and private with one space
filter=-whitespace/indent
# ROS2 allows closing parenthesis to be on the next line
filter=-whitespace/parens
# ROS2 allows the developer to decide about whitespace after a semicolon
filter=-whitespace/semicolon

# Header guard style uses double underscore (ament_cpplint custom)
# Format: LAUNCH_CPP__<PATH>__<FILE>_HPP_
# Example: LAUNCH_CPP__ACTION_HPP_
